<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Drum Kit</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css?family=Arvo" rel="stylesheet">
  
</head>

<body class="container-fluid">

  <h1 id="title" class="my-3 py-3">Drum 🥁 Kit</h1>
  <div class="set container-fluid mx-0">
    <div class="row" style="justify-content: center;">
    <div class="col-lg-1 mx-4 px-3"><button class="w drum">w</button></div>
    <div class="col-lg-1 mx-4 px-3"><button class="a drum">a</button></div>
    <div class="col-lg-1 mx-4 px-3"><button class="s drum">s</button></div>
    <div class="col-lg-1 mx-4 px-3"><button class="d drum">d</button></div>
    <div class="col-lg-1 mx-4 px-3"><button class="j drum">j</button></div>
    <div class="col-lg-1 mx-4 px-3"><button class="k drum">k</button></div>
    <div class="col-lg-1 mx-4 px-3"><button class="l drum">l</button></div>
    </div>
    
  </div>

  <script src="index.js"></script>
</body>

</html>
